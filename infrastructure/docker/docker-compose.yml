# QANTUM QA Framework v1.0.0-QAntum
# Auto-generated by Virtual Material Sync Engine

version: '3.8'

services:
  QANTUM-mind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: QANTUM-mind-production
    image: QANTUM-mind:1.0.0-QAntum
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - QANTUM_MIND_VERSION=1.0.0-QAntum
      - PORT=3000
      - LOG_LEVEL=info
    volumes:
      - ./screenshots:/app/screenshots
      - ./reports:/app/reports
      - ./traces:/app/traces
    networks:
      - QANTUM-mind-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4096M
          cpus: '2'
        reservations:
          memory: 1024M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: QANTUM-mind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - QANTUM-mind-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: QANTUM-mind-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - QANTUM-mind-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: QANTUM-mind-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - QANTUM-mind-network
    restart: unless-stopped

networks:
  QANTUM-mind-network:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
