apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: QANTUM-mind
  labels:
    app: QANTUM-mind
    version: "1.0.0-QAntum"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "2"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 900
      containers:
        - image: gcr.io/PROJECT_ID/qantum:1.0.0-QAntum
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: QANTUM_MIND_VERSION
              value: 1.0.0-QAntum
          resources:
            limits:
              cpu: "2"
              memory: 4096Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
