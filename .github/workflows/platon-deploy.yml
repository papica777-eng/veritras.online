name: Platon App Release & Deploy

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      # In a real scenario, we would compile the Rust binaries here.
      # apt-get install -y cargo ...
      # cargo build --release
      
      - name: Package Application
        run: |
          mkdir -p dist
          cp -r dashboard dist/
          cp -r scripts dist/
          cp package.json dist/
          cp -r Arbitrage dist/
          # Exclude sensitive files or large binaries if needed
          zip -r platon-app-v${{ github.run_number }}.zip dist

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: platon-app-v${{ github.run_number }}.zip
          name: Platon Release v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Prepare Site
        run: |
          mkdir public
          cp landing-page.html public/index.html
          # Copy other assets if needed
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
