<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="quantum-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="orbit-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#0F172A"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#quantum-gradient)" stroke-width="4"/>
  
  <!-- Quantum Orbits -->
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="url(#orbit-gradient)" stroke-width="3" transform="rotate(-30 256 256)" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="url(#orbit-gradient)" stroke-width="3" transform="rotate(30 256 256)" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="url(#orbit-gradient)" stroke-width="3" transform="rotate(90 256 256)" filter="url(#glow)"/>
  
  <!-- Q Letter - Stylized -->
  <path d="M256 120 
           C180 120 130 180 130 256 
           C130 332 180 392 256 392 
           C290 392 320 380 342 360
           L380 400
           L410 370
           L372 330
           C378 308 382 283 382 256
           C382 180 332 120 256 120Z
           M256 170
           C305 170 332 205 332 256
           C332 280 326 300 316 316
           L280 280
           L250 310
           L290 350
           C280 356 268 360 256 360
           C207 360 180 325 180 256
           C180 187 207 170 256 170Z" 
        fill="url(#quantum-gradient)" filter="url(#glow)"/>
  
  <!-- Electron Particles -->
  <circle cx="140" cy="180" r="12" fill="#8B5CF6" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="372" cy="180" r="12" fill="#06B6D4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="400" r="12" fill="#10B981" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Checkmark accent -->
  <path d="M300 240 L340 280 L400 200" fill="none" stroke="#10B981" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
